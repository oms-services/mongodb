oms: 1
lifecycle:
  startup:
    command: ["python", "-m", "oms.mongodb.app"]
info:
  version: 1.0.0
  title: MongoDB
  description: This is a mongodb service
volumes:
  db:
    target: /db
    persist: true
health:
  http:
    path: /health
    port: 8000

x-types:
  col: &collection
      collection:
        help: The MongoDB collection to use
        required: true
        in: requestBody
        type: string
  query: &query
      query:
        help: The MongoDB search query
        required: true
        in: requestBody
        type: map
        map:
          keys:
            type: string
          values:
            type: any
  value: &value
      value:
        help: The value to insert into MongoDB
        required: true
        in: requestBody
        # https://github.com/storyscript/storyscript/issues/1317
        type: any
  values: &values
      values:
        help: The values to insert into MongoDB.
        required: true
        in: requestBody
        type: list
        list:
          elements:
            type: map
            map:
              keys:
                type: string
              values:
                type: any
  upsert: &upsert
      upsert:
        help: |
          If set to 'true', creates a new document when no document matches
          the query criteria.
        required: false
        in: requestBody
        type: boolean

  updateOutput: &updateOutput
      output:
        type: object
        properties:
          matchedCount:
            type: int
          modifiedCount:
            type: int
          upsertedId:
            type: string
          acknowledged:
            type: boolean

  json: &jsonHTTP
    port: 8000
    method: post
    contentType: application/json

actions:
  insertOne:
    help: Insert one entry into a collection.
    http:
      path: /insertOne
      <<: *jsonHTTP
    arguments:
      <<: *collection
      <<: *value
    output:
      type: object
      properties:
        insertedId:
          type: string
        acknowledged:
          type: boolean
  insertMany:
    help: Insert many entries into a collection.
    http:
      path: /insertMany
      <<: *jsonHTTP
    arguments:
      <<: *collection
      <<: *values
    output:
      type: object
      properties:
        insertedIds:
          type: list
          list:
            elements:
              type: string
        acknowledged:
          type: boolean

  findOne:
    help: Finds one entry in a collection.
    http:
      path: /findOne
      <<: *jsonHTTP
    arguments:
      <<: *collection
      <<: *query
    output:
      type: map
      map:
        keys:
          type: string
        values:
          type: any
  findMany:
    help: Finds many entry in a collection.
    http:
      path: /findMany
      <<: *jsonHTTP
    arguments:
      <<: *collection
      <<: *query
    output:
      type: list
      list:
        elements:
          type: map
          map:
            keys:
              type: string
            values:
              type: any
  count:
    help: Count number of matching entries in a collection.
    http:
      path: /countDocuments
      <<: *jsonHTTP
    arguments:
      <<: *collection
      <<: *query
    output:
      type: int

  updateOne:
    help: Updates one entry in a collection.
    http:
      path: /updateOne
      <<: *jsonHTTP
    arguments:
      <<: *collection
      <<: *query
      <<: *value
      <<: *upsert
    <<: *updateOutput

  updateMany:
    help: Update many entry in a collection.
    http:
      path: /updateMany
      <<: *jsonHTTP
    arguments:
      <<: *collection
      <<: *query
      <<: *value
      <<: *upsert
    <<: *updateOutput

  deleteOne:
    help: Delete one entry from a collection.
    http:
      path: /deleteOne
      <<: *jsonHTTP
    arguments:
      <<: *collection
      <<: *query
    output:
      type: object
      properties:
        deletedCount:
          type: int
        acknowledged:
          type: boolean
  deleteMany:
    help: Delete many entries from a collection.
    http:
      path: /deleteMany
      <<: *jsonHTTP
    arguments:
      <<: *collection
      <<: *query
    output:
      type: object
      properties:
        deletedCount:
          type: int
        acknowledged:
          type: boolean

  drop:
    help: Drop an entire collection.
    http:
      path: /drop
      <<: *jsonHTTP
    arguments:
      <<: *collection
    output:
      type: boolean

  listCollection:
    help: List all collections.
    http:
      path: /listCollections
      port: 8000
      method: get
      contentType: application/json
    arguments:
      <<: *collection
    output:
      type: list
      list:
        elements:
          type: string

environment:
  MONGODB_URI:
    help: |
      The MongoDB URI to connect to.
    type: string
    required: false
